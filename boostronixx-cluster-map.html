  { from: "/services/digital-marketing/", to: "/services/ai-marketing-automation/", anchor: "AI marketing automation", type: "recommended" },
  { from: "/services/brand-consulting/", to: "/services/website-design/", anchor: "website design Jaipur", type: "recommended" },
  { from: "/services/ai-automation/", to: "/services/seo-services/", anchor: "AI-powered SEO", type: "recommended" },
  { from: "/industries/real-estate/", to: "/services/performance-marketing/", anchor: "performance marketing for real estate", type: "recommended" },
  { from: "/industries/real-estate/", to: "/services/seo-services/", anchor: "real estate SEO Jaipur", type: "recommended" },
  { from: "/industries/d2c-brands/", to: "/services/social-media-marketing/", anchor: "D2C social media marketing", type: "recommended" },
  { from: "/services/website-design/", to: "/services/seo-services/", anchor: "SEO-friendly website design", type: "recommended" },
  { from: "/services/seo-services/", to: "/services/content-marketing/", anchor: "content marketing", type: "mandatory" },
  { from: "/jaipur-digital-marketing-agency/", to: "/services/digital-marketing/", anchor: "digital marketing services", type: "mandatory" },
  { from: "/jaipur-digital-marketing-agency/", to: "/services/seo-services/", anchor: "SEO company in Jaipur", type: "mandatory" },
  { from: "/services/ai-automation/", to: "/services/whatsapp-chatbot/", anchor: "WhatsApp chatbot", type: "mandatory" },
  { from: "/services/performance-marketing/", to: "/services/google-ads/", anchor: "Google Ads agency", type: "recommended" },
  { from: "/services/performance-marketing/", to: "/services/meta-ads/", anchor: "Meta Ads campaigns", type: "recommended" },
];

let currentCluster = 0;
let currentView = 'clusters';

function setView(v) {
  currentView = v;
  ['clusters','map','links','phases'].forEach(id => {
    const btn = document.getElementById('tab-' + id);
    if (btn) {
      btn.style.background = id === v ? 'var(--card2)' : 'transparent';
      btn.style.color = id === v ? 'var(--text)' : 'var(--muted)';
    }
  });
  render();
}

function showCluster(idx) {
  currentCluster = idx;
  document.querySelectorAll('.cluster-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  if (currentView !== 'clusters') { setView('clusters'); return; }
  render();
}

function statusBadge(s) {
  if (s === 'new') return '<span class="badge new">✦ New</span>';
  if (s === 'optimise') return '<span class="badge optimise">↑ Optimise</span>';
  if (s === 'good') return '<span class="badge good">✓ Good</span>';
  return '';
}

function intentLabel(i) {
  const map = { info: 'Informational', comm: 'Commercial', niche: 'Niche' };
  return map[i] || i;
}

function renderClusters() {
  const c = CLUSTERS[currentCluster];
  return `
    <div class="pillar-card" style="background:${c.color}18;border-color:${c.color}66;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
        <div>
          <div style="font-size:11px;font-weight:700;color:${c.color};text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;">⬟ Pillar Page</div>
          <h2 style="color:${c.color};">${c.pillar.title}</h2>
          <div class="kw">🎯 Primary: <strong>${c.pillar.keyword}</strong></div>
        </div>
        ${statusBadge(c.pillar.status)}
      </div>
      <div class="pillar-meta">
        <span class="pill" style="background:${c.color}22;color:${c.color};">📄 ${c.pillar.template}</span>
        <span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);">📊 ${c.pillar.volume}</span>
        <span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);">✍️ ${c.pillar.wordCount} words</span>
        <span class="pill" style="background:rgba(255,255,255,0.05);color:var(--muted);font-family:monospace;">🔗 ${c.pillar.url}</span>
      </div>
    </div>

    <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;">Spoke Pages (${c.spokes.length})</div>
    <div class="spoke-grid">
      ${c.spokes.map(s => `
        <div class="spoke-card" style="border-left-color:${c.color};">
          <div class="spoke-card" style="border:none;padding:0;background:transparent;">
            <h4>${s.title}</h4>
            <div class="sk">🎯 ${s.keyword}</div>
            <div class="url">${s.url}</div>
            ${statusBadge(s.status)}
          </div>
          <div class="spoke-card::before" style="background:${c.color};"></div>
        </div>
      `).join('')}
    </div>

    <div class="blog-title">📝 Supporting Blog Posts (${c.blogs.length})</div>
    <div class="blog-list">
      ${c.blogs.map(b => `
        <div class="blog-item">
          <div>
            <h5>${b.title}</h5>
            <div class="bk">🎯 ${b.keyword}</div>
          </div>
          <span class="intent-tag ${b.intent}">${intentLabel(b.intent)}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderMap() {
  const W = 960, H = 600;
  const cx = W / 2, cy = H / 2 - 20;
  const R = 200;
  const angles = CLUSTERS.map((_, i) => (i / CLUSTERS.length) * 2 * Math.PI - Math.PI / 2);
  const positions = CLUSTERS.map((c, i) => ({
    x: cx + R * Math.cos(angles[i]),
    y: cy + R * Math.sin(angles[i]),
    c
  }));

  const lines = positions.map((p, i) => {
    const next = positions[(i + 1) % positions.length];
    return `<line x1="${p.x}" y1="${p.y}" x2="${next.x}" y2="${next.y}" stroke="${p.c.color}33" stroke-width="1" stroke-dasharray="4 4"/>`;
  }).join('');

  const centerLines = positions.map(p =>
    `<line x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}" stroke="${p.c.color}44" stroke-width="1.5"/>`
  ).join('');

  const nodes = positions.map(p => {
    const r = 50;
    return `
      <g class="cluster-node" style="cursor:pointer;" onclick="showCluster(${p.c.id})">
        <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="${p.c.color}18" stroke="${p.c.color}88" stroke-width="1.5"/>
        <circle cx="${p.x}" cy="${p.y}" r="${r + 8}" fill="none" stroke="${p.c.color}22" stroke-width="1"/>
        <text x="${p.x}" y="${p.y - 8}" text-anchor="middle" fill="${p.c.color}" font-size="20">
          ${['🏷️','🔍','💻','📣','🤖','🏙️'][p.c.id]}
        </text>
        <text x="${p.x}" y="${p.y + 10}" text-anchor="middle" fill="${p.c.color}" font-size="11" font-weight="700">
          ${p.c.name.split(' ').map((w, li) => `<tspan x="${p.x}" dy="${li === 0 ? 0 : 14}">${w}</tspan>`).join('')}
        </text>
      </g>
    `;
  }).join('');

  const centerNode = `
    <circle cx="${cx}" cy="${cy}" r="52" fill="#1a1d27" stroke="#6c63ff88" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="60" fill="none" stroke="#6c63ff22" stroke-width="1.5"/>
    <text x="${cx}" y="${cy - 10}" text-anchor="middle" fill="#6c63ff" font-size="11" font-weight="800">BOOSTRONIXX</text>
    <text x="${cx}" y="${cy + 6}" text-anchor="middle" fill="#94a3b8" font-size="9">boostronixx.com</text>
    <text x="${cx}" y="${cy + 20}" text-anchor="middle" fill="#94a3b8" font-size="9">Jaipur, India</text>
  `;

  const legend = CLUSTERS.map((c, i) => `
    <rect x="20" y="${480 + i * 20}" width="10" height="10" rx="2" fill="${c.color}"/>
    <text x="36" y="${489 + i * 20}" fill="#94a3b8" font-size="11">${c.name}</text>
  `).join('');

  const totalStats = `
    <text x="${W - 20}" y="490" text-anchor="end" fill="#94a3b8" font-size="11">6 Clusters · 38 Pages · 35 Blog Posts</text>
    <text x="${W - 20}" y="506" text-anchor="end" fill="#94a3b8" font-size="11">94 Internal Links · ~68,000 Words</text>
  `;

  return `
    <div class="map-container">
      <svg id="cluster-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;background:var(--bg);border-radius:12px;border:1px solid var(--border);">
        <defs>
          <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#1a1d27"/>
            <stop offset="100%" stop-color="#0f1117"/>
          </radialGradient>
        </defs>
        <rect width="${W}" height="${H}" fill="url(#bg-grad)" rx="12"/>
        <text x="${W/2}" y="32" text-anchor="middle" fill="#6c63ff" font-size="14" font-weight="700">BoostronixX — Topical Authority Cluster Map</text>
        <text x="${W/2}" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Click any cluster to explore spokes and blog posts</text>
        ${lines}
        ${centerLines}
        ${nodes}
        ${centerNode}
        ${legend}
        ${totalStats}
      </svg>
    </div>
    <div style="margin-top:16px;font-size:13px;color:var(--muted);text-align:center;">Click any cluster node above to jump to its detail view.</div>
  `;
}

function renderLinks() {
  const allLinks = CLUSTERS.flatMap(c => {
    return [
      ...c.spokes.map(s => ({ from: s.url, to: c.pillar.url, anchor: c.pillar.keyword + ' →pillar', type: 'mandatory', color: c.color })),
      ...c.spokes.map(s => ({ from: c.pillar.url, to: s.url, anchor: s.keyword + ' ←pillar', type: 'mandatory', color: c.color })),
    ];
  });

  return `
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;">Internal Link Matrix</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:20px;">All mandatory pillar ↔ spoke links + recommended cross-cluster links. Every spoke must link to its pillar AND receive a link from it.</div>

    <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:#fca5a5;">🔴 Mandatory Links (Pillar ↔ Spokes)</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:20px;max-height:280px;overflow-y:auto;">
      <div style="font-size:11px;color:var(--muted);display:flex;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">
        <div style="width:200px;">From</div><div style="width:20px;"></div><div style="flex:1;">To</div><div style="width:60px;">Type</div>
      </div>
      ${CLUSTERS.flatMap(c => c.spokes.map(s => `
        <div class="link-row">
          <div class="link-from" style="color:${c.color};">${s.url}</div>
          <div class="link-arrow">→</div>
          <div class="link-to">${c.pillar.url}</div>
          <span class="link-type mandatory">Mandatory</span>
        </div>
        <div class="link-row">
          <div class="link-from" style="color:${c.color};">${c.pillar.url}</div>
          <div class="link-arrow">→</div>
          <div class="link-to">${s.url}</div>
          <span class="link-type mandatory">Mandatory</span>
        </div>
      `)).join('')}
    </div>

    <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:#fde68a;">🟡 Cross-Cluster Recommended Links</div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;max-height:280px;overflow-y:auto;">
      <div style="font-size:11px;color:var(--muted);display:flex;gap:8px;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;">
        <div style="width:200px;">From</div><div style="width:20px;"></div><div style="flex:1;">To</div><div style="width:200px;">Anchor</div><div style="width:80px;">Type</div>
      </div>
      ${CROSS_LINKS.map(l => `
        <div class="link-row">
          <div class="link-from">${l.from}</div>
          <div class="link-arrow">→</div>
          <div class="link-to">${l.to}</div>
          <div class="link-anchor">"${l.anchor}"</div>
          <span class="link-type ${l.type}">${l.type === 'mandatory' ? 'Mandatory' : 'Recommended'}</span>
        </div>
      `).join('')}
    </div>

    <div style="margin-top:16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;color:var(--muted);">
      <strong style="color:var(--text);">Linking rules:</strong> Every spoke must have minimum 3 incoming internal links. Anchor text must use target keyword or close variant (never "click here"). Link from within body content, not just navigation. Every blog post links to 1 pillar + 1–2 spokes within same cluster.
    </div>
  `;
}

function renderPhases() {
  return `
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;">Implementation Phase Plan</div>
    <div class="phase" style="border-left:3px solid #ef4444;">
      <h4>🔴 Phase 1 — Quick Wins <span style="font-size:12px;color:var(--muted);font-weight:400;">(Weeks 1–2, ~40 hours)</span></h4>
      <ul>
        <li><strong>Optimise existing 7 service pages</strong> — add Jaipur to title/H1/schema for Brand Consulting, Digital Marketing, Performance Marketing, UI/UX Design</li>
        <li><strong>Write /services/local-seo-jaipur/</strong> — highest local pack potential, existing pillar ready</li>
        <li><strong>Write /services/google-ads/</strong> — high commercial intent, weak competition gap in Jaipur</li>
        <li><strong>Create /jaipur-digital-marketing-agency/</strong> — city hub page, consolidates all local authority</li>
        <li><strong>Add LocalBusiness + Service schema</strong> to all service pages (use schema from Local SEO report)</li>
        <li><strong>Publish 2 blogs:</strong> "SEO vs Google Ads India" + "Local SEO Checklist Jaipur 2026"</li>
      </ul>
    </div>
    <div class="phase" style="border-left:3px solid #f97316;">
      <h4>🟠 Phase 2 — Core Cluster Build <span style="font-size:12px;color:var(--muted);font-weight:400;">(Weeks 3–6, ~80 hours)</span></h4>
      <ul>
        <li><strong>Create /services/ai-automation/ pillar</strong> — new growth topic, low competition, strong differentiation</li>
        <li><strong>Write 3 AI cluster spokes:</strong> ai-marketing-automation/, whatsapp-chatbot/, ai-lead-generation/</li>
        <li><strong>Create /industries/real-estate/</strong> + <strong>/industries/d2c-brands/</strong> — high-value targeting from homepage claims</li>
        <li><strong>Expand /services/seo-services/</strong> from ~1,500 to 3,000+ words with FAQ schema</li>
        <li><strong>Write /services/content-marketing/</strong> + /services/technical-seo/</li>
        <li><strong>Publish 4 informational blogs</strong> (1 per cluster — AI, SEO, Web Design, Jaipur Verticals)</li>
        <li><strong>Internal linking pass</strong> — add cross-cluster links per matrix above</li>
      </ul>
    </div>
    <div class="phase" style="border-left:3px solid #eab308;">
      <h4>🟡 Phase 3 — Authority Build <span style="font-size:12px;color:var(--muted);font-weight:400;">(Weeks 7–12, ~120 hours)</span></h4>
      <ul>
        <li><strong>Complete all industry pages:</strong> Jewellery, EdTech, Startups</li>
        <li><strong>Complete AI cluster spokes:</strong> ai-seo/, marketing-automation-d2c/</li>
        <li><strong>Complete web design cluster:</strong> wordpress-development/, ecommerce-website-design/, landing-page-design/</li>
        <li><strong>Publish remaining blogs at 2 per week cadence</strong></li>
        <li><strong>Build Clutch.co and GoodFirms profiles</strong> — target 5+ reviews on each for AI citation</li>
        <li><strong>Digital PR:</strong> target "best of" agency lists in Jaipur/India for AI Overviews inclusion</li>
        <li><strong>Create llms.txt</strong> at boostronixx.com/llms.txt for AI crawler entity clarity</li>
      </ul>
    </div>

    <div style="margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">Content Production Summary</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;text-align:center;">
        <div><div style="font-size:24px;font-weight:800;color:#6c63ff;">27</div><div style="font-size:12px;color:var(--muted);">New pages</div></div>
        <div><div style="font-size:24px;font-weight:800;color:#43e97b;">11</div><div style="font-size:12px;color:var(--muted);">Optimise existing</div></div>
        <div><div style="font-size:24px;font-weight:800;color:#f7b731;">35</div><div style="font-size:12px;color:var(--muted);">Blog posts</div></div>
        <div><div style="font-size:24px;font-weight:800;color:#ff6584;">68K</div><div style="font-size:12px;color:var(--muted);">Total words</div></div>
        <div><div style="font-size:24px;font-weight:800;color:#56ccf2;">12</div><div style="font-size:12px;color:var(--muted);">Weeks to complete</div></div>
      </div>
    </div>
  `;
}

function render() {
  const main = document.getElementById('main-content');
  if (currentView === 'clusters') main.innerHTML = renderClusters();
  else if (currentView === 'map') main.innerHTML = renderMap();
  else if (currentView === 'links') main.innerHTML = renderLinks();
  else if (currentView === 'phases') main.innerHTML = renderPhases();
}

// Fix spoke card border-left colors with JS since CSS ::before doesn't interpolate vars
function fixSpokeBorders() {
  document.querySelectorAll('.spoke-card').forEach(el => {
    el.style.borderLeftWidth = '3px';
    el.style.borderLeftStyle = 'solid';
  });
}

render();
setTimeout(fixSpokeBorders, 100);
</script>
</body>
