<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BoostronixX Reports</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>

<body class="bg-black text-white font-inter min-h-screen overflow-hidden relative flex items-center justify-center">

  <!-- Background Glow -->
  <div class="absolute top-[-180px] left-[-120px] h-[420px] w-[420px] rounded-full bg-cyan-500/20 blur-3xl"></div>

  <div class="absolute bottom-[-180px] right-[-120px] h-[420px] w-[420px] rounded-full bg-purple-600/20 blur-3xl"></div>

  <main class="relative z-10 w-full max-w-5xl px-6">

    <section
      class="rounded-[32px] border border-white/10 bg-white/5 backdrop-blur-xl p-8 md:p-16 shadow-2xl text-center"
    >

      <!-- Badge -->
      <div
        class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-5 py-2 text-sm font-semibold text-zinc-300"
      >
        🚀 BoostronixX SEO Intelligence
      </div>

      <!-- Heading -->
      <h1
        class="mt-8 text-4xl md:text-6xl font-extrabold leading-tight tracking-[-0.04em]"
      >
        Website
        <span
          class="bg-gradient-to-r from-white to-cyan-300 bg-clip-text text-transparent"
        >
          SEO Reports
        </span>
      </h1>

      <!-- Description -->
      <p
        class="mx-auto mt-6 max-w-2xl text-base md:text-lg leading-8 text-zinc-400"
      >
        Access complete SEO analysis, technical audit insights,
        and E-E-A-T content evaluation reports for BoostronixX.
      </p>

      <!-- Buttons -->
      <div
        class="mt-12 flex flex-col md:flex-row items-center justify-center gap-5"
      >

        <a
          href="./boostronixx-seo-audit-report.html"
          class="group w-full md:w-auto min-w-[290px] rounded-2xl bg-gradient-to-r from-sky-500 to-blue-600 px-7 py-5 text-base font-bold transition duration-300 hover:-translate-y-1 hover:shadow-[0_20px_60px_rgba(37,99,235,0.45)]"
        >
          <span class="flex items-center justify-center gap-3">
            📈 SEO Audit Report
          </span>
        </a>

        <a
          href="./boostronixx-content-eeat-report.html"
          class="group w-full md:w-auto min-w-[290px] rounded-2xl border border-white/10 bg-white/5 px-7 py-5 text-base font-bold text-white transition duration-300 hover:-translate-y-1 hover:bg-white/10"
        >
          <span class="flex items-center justify-center gap-3">
            📝 Content E-E-A-T Report
          </span>
        </a>

        <a
          href="./boostronixx-local-seo-report.html"
          class="group w-full md:w-auto min-w-[290px] rounded-2xl border border-white/10 bg-white/5 px-7 py-5 text-base font-bold text-white transition duration-300 hover:-translate-y-1 hover:bg-white/10"
        >
          <span class="flex items-center justify-center gap-3">
            📝 Local SEO Report
          </span>
        </a>

        <a
          href="./boostronixx-cluster-map.html"
          class="group w-full md:w-auto min-w-[290px] rounded-2xl border border-white/10 bg-white/5 px-7 py-5 text-base font-bold text-white transition duration-300 hover:-translate-y-1 hover:bg-white/10"
        >
          <span class="flex items-center justify-center gap-3">
            📝 Cluster Map
          </span>
        </a>

      </div>

      <!-- Footer -->
      <div class="mt-12 text-sm text-zinc-500">
        © 2026 BoostronixX • Premium SEO Reporting Dashboard
      </div>

    </section>

  </main>

</body>
</html>
